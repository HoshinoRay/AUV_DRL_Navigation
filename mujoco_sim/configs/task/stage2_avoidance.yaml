# configs/task/stage2_avoidance.yaml
name: "avoidance"
_target_: src.envs.tasks.avoidance_task.AvoidanceTask

reward_weights:
  phi_dist: 500.0
  w_align_err: 2.7
  w_roll_err: 3.3
  w_sway_vel: 2.0
  time_penalty: 0.1
  w_accel: 0.05
  w_delta_accel: 0.5
  w_energy: 1.5
  bonus_roll: 0.2
  success: 1500.0
  w_final_bonus: 600.0
  w_collision: 1000.0      # 撞击致死的巨大惩罚 (注意代码里是减去它，这里填正数)
  w_danger_zone: 5.0      # 距离越近，每步扣血越快
  w_survival: 0.1          # 鼓励在危险环境中存活的微小加分 (防止冻结机器人)

goals:
  success_dist: 2.0
  max_dist: 45.0
  target_speed: 1.5
  start_pos: [-13.0, 0.0, 10.0]  # 让 Env 读取
  target_pos: [18.0, 0.0, 10.0] 

safety:
  warning_distance: 4.1    # 小于4米开始报警（扣血）
  critical_distance: 0.4   # 小于0.4米算作撞毁 (由于声呐在头部，0.4m基本就是贴脸了)

curriculum:
  initial_stage: 0         # 默认从 0 阶段开始
  max_stage: 4            # 最高阶段
  target_success_rate: 0.85 # 升级阈值
  window_size: 60         # 评估窗口